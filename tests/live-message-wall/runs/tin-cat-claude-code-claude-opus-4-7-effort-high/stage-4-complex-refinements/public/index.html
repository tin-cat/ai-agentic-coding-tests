<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>wall</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar" role="banner">
    <span class="prompt" aria-hidden="true">&gt;</span>
    <textarea
      id="message-input"
      class="input"
      rows="1"
      maxlength="4096"
      autocomplete="off"
      spellcheck="false"
      placeholder="type a message and press ENTER ..."
      aria-label="message"
    ></textarea>
    <button id="submit-btn" class="btn" type="button">[ add to wall ]</button>
    <span id="status" class="status" aria-live="polite">connecting...</span>
  </header>

  <div id="date-header" class="date-header" aria-live="polite"></div>

  <main id="wall" class="wall" tabindex="0" aria-label="message wall">
    <div id="wall-inner" class="wall-inner"></div>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-hidden="true"></div>

  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" aria-label="full message">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">--- message ---</span>
        <button id="modal-close" class="btn btn-close" type="button" aria-label="close">[ x ]</button>
      </div>
      <div id="modal-scroll" class="modal-scroll">
        <pre id="modal-text" class="modal-text"></pre>
        <div class="modal-meta-row">
          <span id="modal-meta" class="modal-meta"></span>
        </div>
        <form id="reply-form" class="reply-composer" autocomplete="off">
          <span class="prompt" aria-hidden="true">&gt;</span>
          <textarea
            id="reply-input"
            class="input"
            rows="1"
            maxlength="4096"
            autocomplete="off"
            spellcheck="false"
            placeholder="type a reply and press ENTER ..."
            aria-label="reply"
          ></textarea>
          <button id="reply-btn" class="btn" type="submit">[ reply ]</button>
          <span id="reply-status" class="status" aria-live="polite"></span>
        </form>
        <div id="replies-header" class="replies-header" aria-hidden="true"></div>
        <div id="replies-list" class="replies-list" aria-label="replies"></div>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
