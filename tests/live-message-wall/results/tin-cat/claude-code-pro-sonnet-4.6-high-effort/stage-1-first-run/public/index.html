<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALL</title>
  <style>
    :root {
      --bg:        #0c0c0c;
      --surface:   #111111;
      --border:    #222222;
      --border-hi: #383838;
      --text:      #c8c8c8;
      --dim:       #4a4a4a;
      --dimmer:    #2d2d2d;
      --green:     #4ade80;
      --green-dim: #1a4731;
      --blue:      #38bdf8;
      --card-w:    27ch;
      --card-h:    10.5em;
      --bar-h:     36px;
      --status-h:  20px;
      --font:      ui-monospace, "Cascadia Code", "JetBrains Mono", "Fira Code",
                   "Source Code Pro", "Courier New", monospace;
      --fs:        12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: var(--fs);
      line-height: 1.5;
    }

    /* ── Top bar ─────────────────────────────────────────── */

    #topbar {
      display: flex;
      align-items: center;
      height: var(--bar-h);
      padding: 0 10px;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #logo {
      color: var(--green);
      font-weight: bold;
      letter-spacing: .15em;
      white-space: nowrap;
    }

    .vsep {
      color: var(--border-hi);
      user-select: none;
    }

    #prompt {
      color: var(--green);
      user-select: none;
    }

    #msg-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: var(--fs);
      caret-color: var(--green);
    }

    #msg-input::placeholder { color: var(--dim); }

    #char-count {
      color: var(--dim);
      white-space: nowrap;
      font-size: 10px;
      min-width: 6ch;
      text-align: right;
    }

    #char-count.warn { color: #f59e0b; }
    #char-count.over { color: #f87171; }

    #post-btn {
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--dim);
      font-family: var(--font);
      font-size: var(--fs);
      padding: 3px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 80ms, border-color 80ms, background 80ms;
      user-select: none;
    }

    #post-btn:hover:not(:disabled) {
      color: var(--green);
      border-color: var(--green-dim);
    }

    #post-btn:active:not(:disabled) {
      background: rgba(74, 222, 128, .06);
    }

    #post-btn:disabled {
      cursor: default;
      opacity: .5;
    }

    /* ── Wall container ──────────────────────────────────── */

    #wall-outer {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) var(--bg);
    }

    #wall-outer::-webkit-scrollbar       { height: 4px; }
    #wall-outer::-webkit-scrollbar-track { background: var(--bg); }
    #wall-outer::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    #wall {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      height: 100%;
      gap: 7px;
      padding: 8px 10px;
    }

    /* ── Message card ────────────────────────────────────── */

    .card {
      width: var(--card-w);
      height: var(--card-h);
      flex-shrink: 0;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 100ms;
      position: relative;
    }

    .card:hover {
      border-color: var(--border-hi);
    }

    .card:hover .card-body {
      -webkit-mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
              mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
    }

    .card-head {
      flex-shrink: 0;
      padding: 4px 7px 3px;
      border-bottom: 1px solid var(--border);
      color: var(--dim);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-body {
      flex: 1;
      padding: 5px 7px 4px;
      overflow: hidden;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      -webkit-mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
              mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
    }

    .card-more {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 10px;
      color: var(--dim);
      pointer-events: none;
    }

    .card-new {
      animation: card-in 250ms ease-out;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ─────────────────────────────────────── */

    #empty {
      color: var(--dim);
      padding: 12px 4px;
      font-size: 11px;
    }

    /* ── Status bar ──────────────────────────────────────── */

    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: var(--status-h);
      padding: 0 10px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
    }

    #status-conn { transition: color 200ms; }
    #status-conn.live { color: var(--green); }
    #status-conn.err  { color: #f87171; }

    /* ── Modal ───────────────────────────────────────────── */

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .82);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    #overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      width: min(64ch, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    #modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #modal-ts {
      color: var(--dim);
      font-size: 10px;
    }

    #modal-close {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: var(--fs);
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    #modal-close:hover { color: var(--text); }

    #modal-body {
      padding: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      line-height: 1.7;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    /* ── Layout wiring ───────────────────────────────────── */

    body { display: flex; flex-direction: column; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span id="logo">WALL</span>
  <span class="vsep">│</span>
  <span id="prompt">&gt;</span>
  <input id="msg-input" type="text" maxlength="500" placeholder="type a message and press Enter…"
         autocomplete="off" spellcheck="false" aria-label="Message">
  <span id="char-count">500</span>
  <button id="post-btn">[ add to wall ]</button>
</div>

<!-- Wall -->
<div id="wall-outer">
  <div id="wall">
    <span id="empty">no messages yet. be the first.</span>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="status-conn">WALL ──</span>
  <span id="status-count">0 messages</span>
</div>

<!-- Modal -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-ts">
  <div id="modal">
    <div id="modal-head">
      <span id="modal-ts"></span>
      <button id="modal-close" aria-label="Close">[x]</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const MAX_LEN = 500;

  const wall       = document.getElementById('wall');
  const empty      = document.getElementById('empty');
  const input      = document.getElementById('msg-input');
  const charCount  = document.getElementById('char-count');
  const postBtn    = document.getElementById('post-btn');
  const statusConn = document.getElementById('status-conn');
  const statusCnt  = document.getElementById('status-count');
  const overlay    = document.getElementById('overlay');
  const modalTs    = document.getElementById('modal-ts');
  const modalBody  = document.getElementById('modal-body');
  const modalClose = document.getElementById('modal-close');

  let count = 0;
  const seen = new Set(); // dedup by id (handles SSE race with init)

  // ── Helpers ────────────────────────────────────────────

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function fmtTs(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
         + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  // ── Wall rendering ─────────────────────────────────────

  function removeEmpty() {
    if (empty.parentNode === wall) wall.removeChild(empty);
  }

  function makeCard(msg) {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML =
      `<div class="card-head">${fmtTs(msg.timestamp)}</div>` +
      `<div class="card-body">${esc(msg.text)}</div>` +
      `<span class="card-more">···</span>`;
    div.addEventListener('click', () => openModal(msg));
    return div;
  }

  function prependCard(msg) {
    if (seen.has(msg.id)) return;
    seen.add(msg.id);
    removeEmpty();
    const card = makeCard(msg);
    card.classList.add('card-new');
    wall.insertBefore(card, wall.firstChild);
    count++;
    updateCount();
  }

  function appendCard(msg) {
    if (seen.has(msg.id)) return;
    seen.add(msg.id);
    removeEmpty();
    wall.appendChild(makeCard(msg));
    count++;
    updateCount();
  }

  function updateCount() {
    statusCnt.textContent = `${count} message${count === 1 ? '' : 's'}`;
  }

  // ── Modal ──────────────────────────────────────────────

  function openModal(msg) {
    modalTs.textContent = fmtTs(msg.timestamp);
    modalBody.textContent = msg.text;
    overlay.classList.add('open');
    modalClose.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    input.focus();
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Input ──────────────────────────────────────────────

  input.addEventListener('input', () => {
    const remaining = MAX_LEN - input.value.length;
    charCount.textContent = remaining;
    charCount.className = remaining < 20 ? 'over' : remaining < 60 ? 'warn' : '';
  });

  async function post() {
    const text = input.value.trim();
    if (!text || text.length > MAX_LEN) return;

    postBtn.disabled = true;
    postBtn.textContent = '[ posting… ]';

    try {
      const r = await fetch('/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });

      if (r.ok) {
        input.value = '';
        charCount.textContent = MAX_LEN;
        charCount.className = '';
      } else {
        const { error } = await r.json().catch(() => ({}));
        alert(error || 'Could not post message.');
      }
    } catch {
      alert('Network error. Please try again.');
    } finally {
      postBtn.disabled = false;
      postBtn.textContent = '[ add to wall ]';
      input.focus();
    }
  }

  postBtn.addEventListener('click', post);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); post(); }
  });

  // ── SSE ────────────────────────────────────────────────

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      statusConn.textContent = 'WALL ── live';
      statusConn.className = 'live';
    };

    es.onmessage = e => {
      const payload = JSON.parse(e.data);

      if (payload.type === 'init') {
        // Initial batch arrives newest-first (server stores unshift order)
        payload.messages.forEach(msg => appendCard(msg));
      } else if (payload.type === 'message') {
        prependCard(payload);
      }
    };

    es.onerror = () => {
      statusConn.textContent = 'WALL ── reconnecting…';
      statusConn.className = 'err';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
  input.focus();
</script>
</body>
</html>
