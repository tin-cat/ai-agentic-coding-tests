framework:
    cache:
        # Redis backs the app cache pool. The DSN comes from REDIS_URL so the
        # connection target can be swapped per environment without touching
        # configuration.
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

when@test:
    framework:
        cache:
            # Tests use the in-memory array adapter so they never reach for an
            # external Redis and stay isolated from each other.
            app: cache.adapter.array
