[www]
; Log FPM access and errors to stderr so `docker compose logs app` shows them.
access.log = /dev/stdout
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

listen = 9000
pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 2
pm.max_spare_servers = 6
