# Service wiring for Frontstage.
#
# The container is part of the Symfony adapter layer. The domain layer is never
# autoloaded as services (it contains plain PHP objects, value objects, and
# aggregate roots). Only application handlers and infrastructure adapters are
# registered. Adapters are bound to their domain ports via interface aliases.

parameters:

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    # Application layer: command and query handlers per bounded context.
    # Tagged so Symfony Messenger picks them up on the command/query buses.
    Frontstage\Catalog\Application\:
        resource: '../src/Catalog/Application/'

    # Infrastructure adapters per bounded context.
    Frontstage\Catalog\Infrastructure\:
        resource: '../src/Catalog/Infrastructure/'
        exclude:
            - '../src/Catalog/Infrastructure/Persistence/Doctrine/Entity/'

    # Controllers are infrastructure adapters; they must be public so the router
    # can invoke them.
    Frontstage\Catalog\Infrastructure\Http\Controller\:
        resource: '../src/Catalog/Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    # Port -> adapter bindings for the Catalog context.
    Frontstage\Catalog\Domain\Repository\EventRepository:
        alias: Frontstage\Catalog\Infrastructure\Persistence\Doctrine\DoctrineEventRepository

    Frontstage\Catalog\Application\Query\EventReadModel:
        alias: Frontstage\Catalog\Infrastructure\Persistence\Doctrine\DoctrineEventReadModel

    Frontstage\Catalog\Application\Bus\CommandBus:
        alias: Frontstage\Catalog\Infrastructure\Messenger\MessengerCommandBus

    Frontstage\Catalog\Application\Bus\QueryBus:
        alias: Frontstage\Catalog\Infrastructure\Messenger\MessengerQueryBus

    # Reservations context.
    Frontstage\Reservations\Application\:
        resource: '../src/Reservations/Application/'

    Frontstage\Reservations\Infrastructure\:
        resource: '../src/Reservations/Infrastructure/'

    Frontstage\Reservations\Infrastructure\Http\Controller\:
        resource: '../src/Reservations/Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    Frontstage\Reservations\Domain\Repository\HoldRepository:
        alias: Frontstage\Reservations\Infrastructure\Persistence\Cache\CacheHoldRepository

    Frontstage\Reservations\Domain\Service\SeatLocker:
        alias: Frontstage\Reservations\Infrastructure\Lock\SymfonyLockSeatLocker

    Frontstage\Reservations\Domain\Service\Clock:
        alias: Frontstage\Reservations\Infrastructure\Clock\SystemClock

    Frontstage\Reservations\Domain\Service\EventSeats:
        alias: Frontstage\Reservations\Infrastructure\Adapter\CatalogEventSeats

    Frontstage\Reservations\Application\Query\AvailabilityReadModel:
        alias: Frontstage\Reservations\Infrastructure\Query\CompositeAvailabilityReadModel

    Frontstage\Reservations\Application\Bus\CommandBus:
        alias: Frontstage\Reservations\Infrastructure\Messenger\MessengerCommandBus

    Frontstage\Reservations\Application\Bus\QueryBus:
        alias: Frontstage\Reservations\Infrastructure\Messenger\MessengerQueryBus

    # The cache pool is wired via the framework cache.app alias. Inject it
    # explicitly where the typed parameter is the PSR-6 interface.
    Frontstage\Reservations\Infrastructure\Persistence\Cache\CacheHoldRepository:
        arguments:
            $cache: '@cache.app'

    # Ordering context.
    Frontstage\Ordering\Application\:
        resource: '../src/Ordering/Application/'

    Frontstage\Ordering\Infrastructure\:
        resource: '../src/Ordering/Infrastructure/'
        exclude:
            - '../src/Ordering/Infrastructure/Persistence/Doctrine/Entity/'

    Frontstage\Ordering\Infrastructure\Http\Controller\:
        resource: '../src/Ordering/Infrastructure/Http/Controller/'
        tags: ['controller.service_arguments']

    Frontstage\Ordering\Domain\Repository\OrderRepository:
        alias: Frontstage\Ordering\Infrastructure\Persistence\Doctrine\DoctrineOrderRepository

    Frontstage\Ordering\Application\Query\OrderReadModel:
        alias: Frontstage\Ordering\Infrastructure\Persistence\Doctrine\DoctrineOrderReadModel

    Frontstage\Ordering\Domain\Service\HoldGateway:
        alias: Frontstage\Ordering\Infrastructure\Adapter\ReservationsHoldGateway

    Frontstage\Ordering\Domain\Service\EventPricing:
        alias: Frontstage\Ordering\Infrastructure\Adapter\CatalogEventPricing

    Frontstage\Ordering\Domain\Service\SeatSales:
        alias: Frontstage\Ordering\Infrastructure\Adapter\CatalogSeatSales

    Frontstage\Ordering\Application\Bus\CommandBus:
        alias: Frontstage\Ordering\Infrastructure\Messenger\MessengerCommandBus

    Frontstage\Ordering\Application\Bus\QueryBus:
        alias: Frontstage\Ordering\Infrastructure\Messenger\MessengerQueryBus
