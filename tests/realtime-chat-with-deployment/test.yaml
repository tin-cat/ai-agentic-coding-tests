contributor_url: https://github.com/tin-cat
name: realtime-chat-with-deployment
title: A real-time chat app with automated deployment
description: |
  A WebSocket-based chat application with multiple rooms, presence, and basic moderation. Builds from a single shared room up to a moderated multi-room app. Includes automated deployment to AWS for a complete development-to-live workflow.
domain: full-stack-web
stack: node-express

stages:
  - id: stage-1-first-run
    theme: bootstrap
    prompt: |
      Build a real-time chat app: a backend built with Node and Express and a minimal web client. Anyone who opens the page picks a display name and joins a shared room. Messages broadcast to all connected clients in real time and the last 1000 messages are kept in memory and replayed to new joiners. The UI should look like a typical chatroom page, with a list of messages taking the entire screen except for an input and a "Send" button at the bottom to enter new messages.
      Add a README.md documenting the code structure, the tech stack and useful information for the user like what's this project about, how to run it and contribute to it.

  - id: stage-2-rooms
    builds_on: stage-1-first-run
    theme: features
    prompt: |
      Add named rooms: the URL hash (#room-name) selects the room, and messages are scoped to that room. Display a list of all rooms currently with active users. Show the current room name and let users switch rooms without reloading. Persist messages per room to SQLite so history survives a server restart (keep the last 200 per room).

  - id: stage-3-private-messages
    builds_on: stage-2-rooms
    theme: refactor
    prompt: |
      Allow user-to-user private message rooms.

  - id: stage-4-security
    builds_on: stage-3-private-messages
    theme: security
    prompt: |
      Add lightweight moderation: a per-room rate limit (max 5 messages / 10s per user), a configurable banned-word filter that masks matches, and a message length cap. Sanitize all message content to prevent HTML, XSS, SQL injection and other typical attack vectors like CSRF.

  - id: stage-5-deploy-aws
    builds_on: stage-4-security
    theme: extension
    prompt: |
      Make the whole app deployable to AWS with a single command. Provide infrastructure-as-code (e.g. AWS CDK, CloudFormation, or Terraform) plus a documented deploy script so a user with their own AWS account and credentials can set the app running from scratch — the WebSocket server, the static web client, and a publicly reachable HTTPS URL — without manual console clicking. The SQLite room history must live on durable storage (a mounted volume or equivalent) so it survives redeploys. Re-running the deploy after code changes must update the app in place without dropping existing message history or other persisted data. Document the required prerequisites, environment variables (including the admin token), and the deployment commands. Sensible tokens and keys must not be committed.
