<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chat Room</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<!-- Name prompt: shown until the user picks a display name. -->
	<div id="join-overlay" class="overlay">
		<form id="join-form" class="join-card">
			<h1>Join the chat</h1>
			<p>Pick a display name to enter <strong id="join-room">#general</strong>.</p>
			<input
				id="name-input"
				type="text"
				placeholder="Your name"
				maxlength="40"
				autocomplete="off"
				required
			>
			<button type="submit">Join</button>
		</form>
	</div>

	<div id="app" class="app hidden">
		<!-- Sidebar: rooms that currently have active users. -->
		<aside class="sidebar">
			<div class="sidebar-header">Rooms</div>
			<ul id="room-list" class="room-list"></ul>
			<form id="room-form" class="room-form">
				<input
					id="room-input"
					type="text"
					placeholder="New room…"
					maxlength="40"
					autocomplete="off"
				>
				<button type="submit">Go</button>
			</form>

			<div class="sidebar-header">Direct messages</div>
			<ul id="dm-list" class="room-list dm-list"></ul>
			<form id="dm-form" class="room-form">
				<input
					id="dm-input"
					type="text"
					placeholder="Message a user…"
					maxlength="40"
					autocomplete="off"
				>
				<button type="submit">DM</button>
			</form>
		</aside>

		<div class="chat">
			<header class="chat-header">
				<span id="room-title" class="room-title">#general</span>
				<span id="connection-status" class="status">connecting…</span>
			</header>

			<ul id="messages" class="messages"></ul>

			<form id="message-form" class="composer">
				<input
					id="message-input"
					type="text"
					placeholder="Type a message…"
					maxlength="2000"
					autocomplete="off"
					disabled
				>
				<button id="send-button" type="submit" disabled>Send</button>
			</form>
		</div>
	</div>

	<script src="client.js"></script>
</body>
</html>
