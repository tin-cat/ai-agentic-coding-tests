<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Chat Rooms</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<!-- Name prompt: shown until the user picks a display name. -->
	<div id="join-overlay" class="overlay">
		<form id="join-form" class="join-card">
			<h1>Join the chat</h1>
			<p>Pick a display name to enter <span id="join-room" class="join-room">the lobby</span>.</p>
			<input
				id="name-input"
				type="text"
				placeholder="Your name"
				maxlength="40"
				autocomplete="off"
				required
			>
			<button type="submit">Join</button>
		</form>
	</div>

	<div id="app" class="app hidden">
		<!-- Room list: every room that currently has people in it. -->
		<aside class="sidebar">
			<div class="sidebar-head">Rooms</div>
			<ul id="room-list" class="room-list"></ul>
			<form id="room-form" class="room-form">
				<input
					id="room-input"
					type="text"
					placeholder="Go to room…"
					maxlength="40"
					autocomplete="off"
				>
				<button type="submit" title="Switch room">Go</button>
			</form>
		</aside>

		<div class="chat">
			<header class="chat-header">
				<span class="room-title"># <span id="room-name">lobby</span></span>
				<span id="connection-status" class="status">connecting…</span>
			</header>

			<ul id="messages" class="messages"></ul>

			<form id="message-form" class="composer">
				<input
					id="message-input"
					type="text"
					placeholder="Type a message…"
					maxlength="2000"
					autocomplete="off"
					disabled
				>
				<button id="send-button" type="submit" disabled>Send</button>
			</form>
		</div>
	</div>

	<script src="client.js"></script>
</body>
</html>
