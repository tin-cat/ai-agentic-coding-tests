<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<title>320x200 ZONE - a demoscene production</title>
	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #000;
			overflow: hidden;
			cursor: none;
		}
		canvas {
			display: block;
		}
		/* The unavoidable concession to modern browsers: audio cannot start
		   without a user gesture. The demo itself runs with zero interaction
		   after this single click. */
		#boot {
			position: fixed;
			inset: 0;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: #05060a;
			color: #d5dde8;
			font-family: "Courier New", monospace;
			text-align: center;
			cursor: pointer;
			z-index: 10;
			transition: opacity 0.4s ease;
		}
		#boot h1 {
			font-size: clamp(28px, 7vw, 72px);
			letter-spacing: 0.15em;
			margin: 0 0 0.2em;
			text-shadow: 0 0 12px #3a6cff, 0 0 2px #fff;
		}
		#boot p {
			font-size: clamp(13px, 2.4vw, 20px);
			opacity: 0.8;
			margin: 0.3em 0;
		}
		#boot .blink {
			margin-top: 1.4em;
			animation: blink 1s steps(2, start) infinite;
			letter-spacing: 0.25em;
		}
		@keyframes blink { to { visibility: hidden; } }
	</style>

	<!-- Three.js as an ES module via CDN. Needs network on first load. -->
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
		}
	}
	</script>
</head>
<body>
	<div id="boot">
		<h1>THE 320&times;200 ZONE</h1>
		<p>a chunky-pixel demoscene production</p>
		<p>320&times;200 &middot; 256 colours &middot; 4:3 &middot; tracker tune</p>
		<div class="blink">CLICK OR PRESS ANY KEY TO START</div>
	</div>

	<script type="module" src="./src/main.js"></script>
</body>
</html>
