<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALL</title>
  <style>
    :root {
      --bg:        #0c0c0c;
      --surface:   #111111;
      --border:    #222222;
      --border-hi: #383838;
      --text:      #c8c8c8;
      --dim:       #4a4a4a;
      --dimmer:    #2d2d2d;
      --green:     #4ade80;
      --green-dim: #1a4731;
      --blue:      #38bdf8;
      --card-w:    27ch;
      --card-h:    10.5em;
      --bar-h:     36px;
      --status-h:  20px;
      --font:      ui-monospace, "Cascadia Code", "JetBrains Mono", "Fira Code",
                   "Source Code Pro", "Courier New", monospace;
      --fs:        12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: var(--fs);
      line-height: 1.5;
    }

    /* ── Top bar ─────────────────────────────────────────── */

    #topbar {
      display: flex;
      align-items: center;
      height: var(--bar-h);
      padding: 0 10px;
      gap: 8px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #logo {
      color: var(--green);
      font-weight: bold;
      letter-spacing: .15em;
      white-space: nowrap;
    }

    .vsep {
      color: var(--border-hi);
      user-select: none;
    }

    #prompt {
      color: var(--green);
      user-select: none;
    }

    #msg-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: var(--fs);
      caret-color: var(--green);
    }

    #msg-input::placeholder { color: var(--dim); }

    #char-count {
      color: var(--dim);
      white-space: nowrap;
      font-size: 10px;
      min-width: 6ch;
      text-align: right;
    }

    #char-count.warn { color: #f59e0b; }
    #char-count.over { color: #f87171; }

    #post-btn {
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--dim);
      font-family: var(--font);
      font-size: var(--fs);
      padding: 3px 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: color 80ms, border-color 80ms, background 80ms;
      user-select: none;
    }

    #post-btn:hover:not(:disabled) {
      color: var(--green);
      border-color: var(--green-dim);
    }

    #post-btn:active:not(:disabled) {
      background: rgba(74, 222, 128, .06);
    }

    #post-btn:disabled {
      cursor: default;
      opacity: .5;
    }

    /* ── Wall container ──────────────────────────────────── */

    #wall-outer {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) var(--bg);
    }

    #wall-outer::-webkit-scrollbar       { height: 4px; }
    #wall-outer::-webkit-scrollbar-track { background: var(--bg); }
    #wall-outer::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }

    #wall {
      display: flex;
      flex-direction: column;
      flex-wrap: wrap;
      align-content: flex-start;
      height: 100%;
      gap: 7px;
      padding: 8px 10px;
    }

    /* ── Message card ────────────────────────────────────── */

    .card {
      width: var(--card-w);
      height: var(--card-h);
      flex-shrink: 0;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
      transition: border-color 100ms, opacity 400ms;
      position: relative;
    }

    .card:hover {
      border-color: var(--border-hi);
      opacity: 1 !important;
      transition: border-color 100ms, opacity 120ms;
    }

    .card:hover .card-body {
      -webkit-mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
              mask-image: linear-gradient(to bottom, #000 55%, transparent 100%);
    }

    .card-head {
      flex-shrink: 0;
      padding: 4px 7px 3px;
      border-bottom: 1px solid var(--border);
      color: var(--dim);
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-body {
      flex: 1;
      padding: 5px 7px 4px;
      overflow: hidden;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      -webkit-mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
              mask-image: linear-gradient(to bottom, #000 60%, transparent 100%);
    }

    .card-more {
      position: absolute;
      bottom: 4px;
      right: 6px;
      font-size: 10px;
      color: var(--dim);
      pointer-events: none;
    }

    .card-new {
      animation: card-in 250ms ease-out;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading indicator ───────────────────────────────── */

    #load-more {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--card-w);
      height: 100%;
      flex-shrink: 0;
      color: var(--dim);
      font-size: 10px;
      padding: 0 10px;
    }

    /* ── Empty state ─────────────────────────────────────── */

    #empty {
      color: var(--dim);
      padding: 12px 4px;
      font-size: 11px;
    }

    /* ── Status bar ──────────────────────────────────────── */

    #statusbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: var(--status-h);
      padding: 0 10px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--dim);
      flex-shrink: 0;
    }

    #status-conn { transition: color 200ms; }
    #status-conn.live { color: var(--green); }
    #status-conn.err  { color: #f87171; }

    /* ── Modal ───────────────────────────────────────────── */

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .82);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    #overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border-hi);
      width: min(64ch, 90vw);
      max-height: 80vh;
      display: flex;
      flex-direction: column;
    }

    #modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #modal-ts {
      color: var(--dim);
      font-size: 10px;
    }

    #modal-close {
      background: none;
      border: none;
      color: var(--dim);
      font-family: var(--font);
      font-size: var(--fs);
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }

    #modal-close:hover { color: var(--text); }

    #modal-body {
      padding: 10px;
      overflow-y: auto;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      line-height: 1.7;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--border-hi) transparent;
    }

    /* ── Modal links ─────────────────────────────────────── */

    #modal-body a {
      color: var(--blue);
      text-decoration: none;
    }

    #modal-body a:hover { text-decoration: underline; }

    /* ── Toast ───────────────────────────────────────────── */

    #toast {
      position: fixed;
      bottom: calc(var(--status-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface);
      border: 1px solid var(--border-hi);
      color: var(--text);
      padding: 7px 14px;
      font-size: 11px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 180ms, transform 180ms;
      z-index: 100;
      white-space: nowrap;
    }

    #toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Layout wiring ───────────────────────────────────── */

    body { display: flex; flex-direction: column; }
  </style>
</head>
<body>

<!-- Top bar -->
<div id="topbar">
  <span id="logo">WALL</span>
  <span class="vsep">│</span>
  <span id="prompt">&gt;</span>
  <input id="msg-input" type="text" maxlength="500" placeholder="type a message and press Enter…"
         autocomplete="off" spellcheck="false" aria-label="Message">
  <span id="char-count">500</span>
  <button id="post-btn">[ add to wall ]</button>
</div>

<!-- Wall -->
<div id="wall-outer">
  <div id="wall">
    <span id="empty">no messages yet. be the first.</span>
    <div id="load-more"></div>
  </div>
</div>

<!-- Status bar -->
<div id="statusbar">
  <span id="status-conn">WALL ──</span>
  <span id="status-count">0 messages</span>
</div>

<!-- Toast -->
<div id="toast" role="status" aria-live="polite"></div>

<!-- Modal -->
<div id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-ts">
  <div id="modal">
    <div id="modal-head">
      <span id="modal-ts"></span>
      <button id="modal-close" aria-label="Close">[x]</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
  const MAX_LEN = 500;
  const TEN_MIN_MS = 10 * 60 * 1000;
  const ONE_MONTH_MS = 30 * 24 * 60 * 60 * 1000;

  const toast      = document.getElementById('toast');
  const wallOuter  = document.getElementById('wall-outer');
  const wall       = document.getElementById('wall');
  const empty      = document.getElementById('empty');
  const loadMore   = document.getElementById('load-more');
  const input      = document.getElementById('msg-input');
  const charCount  = document.getElementById('char-count');
  const postBtn    = document.getElementById('post-btn');
  const statusConn = document.getElementById('status-conn');
  const statusCnt  = document.getElementById('status-count');
  const overlay    = document.getElementById('overlay');
  const modalTs    = document.getElementById('modal-ts');
  const modalBody  = document.getElementById('modal-body');
  const modalClose = document.getElementById('modal-close');

  let toastTimer = null;
  let loadedCount = 0;
  let totalCount = 0;
  let oldestTimestamp = null;
  let hasMore = false;
  let isLoadingMore = false;
  let cooldownTimer = null;

  const seen = new Set();

  // ── Helpers ────────────────────────────────────────────

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#x27;');
  }

  // Wrap http(s) URLs in <a> tags; all text is HTML-escaped
  function linkify(text) {
    const URL_RE = /https?:\/\/[^\s<>"{}|\\^`[\]]+/g;
    const parts = [];
    let last = 0;
    let m;
    while ((m = URL_RE.exec(text)) !== null) {
      parts.push(esc(text.slice(last, m.index)));
      const url = m[0];
      parts.push(`<a href="${esc(url)}" target="_blank" rel="noopener noreferrer">${esc(url)}</a>`);
      last = URL_RE.lastIndex;
    }
    parts.push(esc(text.slice(last)));
    return parts.join('');
  }

  function getCsrfToken() {
    const m = document.cookie.match(/(?:^|; )wallCsrfToken=([^;]*)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  function showToast(msg, ms = 4000) {
    toast.textContent = msg;
    toast.classList.add('visible');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('visible'), ms);
  }

  function fmtTs(iso) {
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} `
         + `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }

  function getOpacity(ts) {
    const age = Date.now() - new Date(ts).getTime();
    return Math.max(0, 1 - age / ONE_MONTH_MS);
  }

  // ── Wall rendering ─────────────────────────────────────

  function removeEmpty() {
    if (empty.parentNode === wall) wall.removeChild(empty);
  }

  function makeCard(msg) {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.ts = msg.timestamp;
    div.style.opacity = getOpacity(msg.timestamp);
    div.innerHTML =
      `<div class="card-head">${fmtTs(msg.timestamp)}</div>` +
      `<div class="card-body">${esc(msg.text)}</div>` +
      `<span class="card-more">···</span>`;
    div.addEventListener('click', () => openModal(msg));
    return div;
  }

  function prependCard(msg) {
    if (seen.has(msg.id)) return;
    seen.add(msg.id);
    removeEmpty();
    const card = makeCard(msg);
    card.classList.add('card-new');
    wall.insertBefore(card, wall.firstChild);
    loadedCount++;
    totalCount++;
    updateCount();
  }

  function appendCard(msg) {
    if (seen.has(msg.id)) return;
    seen.add(msg.id);
    removeEmpty();
    wall.insertBefore(makeCard(msg), loadMore);
    loadedCount++;
    if (msg.timestamp < (oldestTimestamp ?? '')) oldestTimestamp = msg.timestamp;
    else if (!oldestTimestamp) oldestTimestamp = msg.timestamp;
    updateCount();
  }

  function updateCount() {
    const allLoaded = !hasMore;
    statusCnt.textContent = allLoaded
      ? `${loadedCount} message${loadedCount === 1 ? '' : 's'}`
      : `${loadedCount} of ${totalCount} messages`;
  }

  // ── Opacity fading ─────────────────────────────────────

  function updateOpacities() {
    const cards = wall.querySelectorAll('.card[data-ts]');
    cards.forEach(card => {
      const opacity = getOpacity(card.dataset.ts);
      if (opacity <= 0) {
        card.remove();
        loadedCount = Math.max(0, loadedCount - 1);
        totalCount = Math.max(0, totalCount - 1);
        updateCount();
      } else {
        card.style.opacity = opacity;
      }
    });
  }

  setInterval(updateOpacities, 5 * 60 * 1000);

  // ── Lazy loading ───────────────────────────────────────

  async function fetchMore() {
    if (isLoadingMore || !hasMore) return;
    isLoadingMore = true;
    loadMore.textContent = 'loading…';

    try {
      const url = oldestTimestamp
        ? `/messages?before=${encodeURIComponent(oldestTimestamp)}&limit=50`
        : '/messages?limit=50';
      const r = await fetch(url);
      if (!r.ok) return;
      const data = await r.json();
      data.messages.forEach(appendCard);
      hasMore = data.hasMore;
      totalCount = data.total;
      updateCount();
    } catch (_) {
    } finally {
      isLoadingMore = false;
      loadMore.textContent = hasMore ? '' : '';
    }
  }

  wallOuter.addEventListener('scroll', () => {
    const { scrollLeft, scrollWidth, clientWidth } = wallOuter;
    if (scrollLeft + clientWidth >= scrollWidth - 600) {
      fetchMore();
    }
  });

  // ── Modal ──────────────────────────────────────────────

  function openModal(msg) {
    modalTs.textContent = fmtTs(msg.timestamp);
    modalBody.innerHTML = linkify(msg.text);
    overlay.classList.add('open');
    modalClose.focus();
  }

  function closeModal() {
    overlay.classList.remove('open');
    input.focus();
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ── Cooldown ───────────────────────────────────────────

  function startCooldown(retryAfterSeconds) {
    const until = Date.now() + retryAfterSeconds * 1000;
    localStorage.setItem('wallCooldownUntil', String(until));
    runCooldown(until);
  }

  function runCooldown(until) {
    if (cooldownTimer) clearInterval(cooldownTimer);
    postBtn.disabled = true;

    const tick = () => {
      const remaining = Math.ceil((until - Date.now()) / 1000);
      if (remaining <= 0) {
        clearInterval(cooldownTimer);
        cooldownTimer = null;
        postBtn.disabled = false;
        postBtn.textContent = '[ add to wall ]';
        localStorage.removeItem('wallCooldownUntil');
        return;
      }
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      postBtn.textContent = m > 0 ? `[ wait ${m}m ${s}s ]` : `[ wait ${s}s ]`;
    };

    tick();
    cooldownTimer = setInterval(tick, 1000);
  }

  // Restore cooldown after page reload
  const storedCooldown = localStorage.getItem('wallCooldownUntil');
  if (storedCooldown) {
    const until = parseInt(storedCooldown, 10);
    if (until > Date.now()) runCooldown(until);
  }

  // ── Input ──────────────────────────────────────────────

  input.addEventListener('input', () => {
    const remaining = MAX_LEN - input.value.length;
    charCount.textContent = remaining;
    charCount.className = remaining < 20 ? 'over' : remaining < 60 ? 'warn' : '';
  });

  async function post() {
    const text = input.value.trim();
    if (!text || text.length > MAX_LEN) return;

    // Inform user of remaining cooldown instead of silently ignoring Enter
    if (postBtn.disabled) {
      const stored = localStorage.getItem('wallCooldownUntil');
      if (stored) {
        const remaining = Math.ceil((parseInt(stored, 10) - Date.now()) / 1000);
        if (remaining > 0) {
          const m = Math.floor(remaining / 60), s = remaining % 60;
          showToast(m > 0 ? `Rate limited — try again in ${m}m ${s}s` : `Rate limited — try again in ${s}s`);
        }
      }
      return;
    }

    postBtn.disabled = true;
    postBtn.textContent = '[ posting… ]';

    try {
      const r = await fetch('/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRF-Token': getCsrfToken(),
        },
        body: JSON.stringify({ text }),
      });

      if (r.ok) {
        input.value = '';
        charCount.textContent = MAX_LEN;
        charCount.className = '';
        localStorage.setItem('wallCooldownUntil', String(Date.now() + TEN_MIN_MS));
        startCooldown(10 * 60);
      } else {
        const data = await r.json().catch(() => ({}));
        if (r.status === 429 && data.retryAfter) {
          const ra = data.retryAfter;
          startCooldown(ra);
          const m = Math.floor(ra / 60), s = ra % 60;
          showToast(m > 0 ? `Rate limited — try again in ${m}m ${s}s` : `Rate limited — try again in ${s}s`);
        } else {
          postBtn.disabled = false;
          postBtn.textContent = '[ add to wall ]';
          showToast(data.error || 'Could not post message.');
        }
      }
    } catch {
      postBtn.disabled = false;
      postBtn.textContent = '[ add to wall ]';
      showToast('Network error. Please try again.');
    } finally {
      input.focus();
    }
  }

  postBtn.addEventListener('click', post);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); post(); }
  });

  // ── SSE ────────────────────────────────────────────────

  function connect() {
    const es = new EventSource('/events');

    es.onopen = () => {
      statusConn.textContent = 'WALL ── live';
      statusConn.className = 'live';
    };

    es.onmessage = e => {
      const payload = JSON.parse(e.data);

      if (payload.type === 'init') {
        totalCount = payload.total;
        payload.messages.forEach(appendCard);
        hasMore = loadedCount < totalCount;
        updateCount();
      } else if (payload.type === 'message') {
        prependCard(payload);
      }
    };

    es.onerror = () => {
      statusConn.textContent = 'WALL ── reconnecting…';
      statusConn.className = 'err';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
  input.focus();
</script>
</body>
</html>
